name: fintech-analytics CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'fintech_analytics_pkg/**'
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          cd fintech_analytics_pkg
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          cd fintech_analytics_pkg
          pytest tests/ -v --cov=fintech_analytics --cov-report=term-missing

      - name: Test CLI
        run: |
          cd fintech_analytics_pkg
          fintech-analytics --help
