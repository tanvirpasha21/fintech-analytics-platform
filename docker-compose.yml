version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Fintech Analytics Platform — Full Stack
#
# Services:
#   postgres          Airflow metadata DB (replaces SQLite — required for
#                     parallel task execution)
#   zookeeper         Kafka coordination
#   kafka             Message broker
#   kafka-ui          Web UI  →  http://localhost:8080
#   kafka-init        Creates topics on first boot
#   airflow-init      Initialises Airflow DB + admin user
#   airflow-web       Airflow UI  →  http://localhost:8081  (admin / admin)
#   airflow-scheduler Runs DAGs on schedule
#
# Usage:
#   docker compose up -d              # start everything
#   docker compose logs -f kafka      # watch kafka logs
#   docker compose logs -f airflow-scheduler  # watch DAG runs
#   docker compose down               # stop (keeps volumes)
#   docker compose down -v            # stop + wipe all data
# ─────────────────────────────────────────────────────────────────────────────

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  environment:
    # Fix 2: PostgreSQL instead of SQLite — required for parallel tasks
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__LOGGING__LOG_LEVEL: WARNING
    AIRFLOW__CORE__PARALLELISM: "8"
    AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: "6"

    # Fintech platform paths — used by all DAG tasks
    FINTECH_DB_PATH: /opt/airflow/data/fintech.duckdb
    FINTECH_STREAM_DB_PATH: /opt/airflow/data/fintech_stream.duckdb
    FINTECH_DBT_PATH: /opt/airflow/fintech_dbt
    FINTECH_SCRIPTS_PATH: /opt/airflow/scripts

    # Kafka bootstrap — used by health check and lag monitor tasks
    KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    KAFKA_CONSUMER_GROUP: fintech-duckdb-sink

    PYTHONPATH: /opt/airflow
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./data:/opt/airflow/data
    - ./fintech_dbt:/opt/airflow/fintech_dbt
    - ./scripts:/opt/airflow/scripts
  depends_on:
    postgres:
      condition: service_healthy
    kafka:
      condition: service_healthy

services:

  # ── POSTGRESQL (Airflow metadata DB) ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: fintech_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── KAFKA STACK ──────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: fintech_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: fintech_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      # PLAINTEXT      = internal Docker network  (kafka:29092)
      # PLAINTEXT_HOST = host machine access      (localhost:9092)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # Creates all required topics on first boot then exits
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: fintech_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Creating Kafka topics...'
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic fintech.transactions --partitions 3 --replication-factor 1 \
        --config retention.ms=604800000 --config compression.type=gzip

      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic fintech.fraud_alerts --partitions 3 --replication-factor 1 \
        --config retention.ms=2592000000

      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic fintech.dlq --partitions 1 --replication-factor 1 \
        --config retention.ms=2592000000

      echo 'Topics ready:'
      kafka-topics --bootstrap-server kafka:29092 --list
      "
    restart: "no"

  # Web UI to browse topics and inspect messages
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: fintech_kafka_ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: fintech-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  # ── AIRFLOW ──────────────────────────────────────────────────────────────────
  # One-shot init container: installs deps, migrates DB, creates admin user
  airflow-init:
    <<: *airflow-common
    container_name: fintech_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install dbt-duckdb duckdb pandas faker kafka-python psycopg2-binary --quiet
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname Tanvir --lastname Anjum \
          --role Admin --email contact@voidstudio.tech 2>/dev/null || true
        echo "Airflow initialised."
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  airflow-web:
    <<: *airflow-common
    container_name: fintech_airflow_web
    ports:
      - "8081:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: fintech_airflow_scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  zookeeper_data:
  kafka_data:
